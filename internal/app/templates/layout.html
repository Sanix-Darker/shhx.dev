{{ define "layout" }}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .PreviewDesc }}">
  <meta property="og:title" content="{{ .PreviewTitle }}">
  <meta property="og:description" content="{{ .PreviewDesc }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .PreviewURL }}">
  <meta property="og:image" content="{{ .PreviewImage }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .PreviewTitle }}">
  <meta name="twitter:description" content="{{ .PreviewDesc }}">
  <meta name="twitter:image" content="{{ .PreviewImage }}">
  <style nonce="{{ .StyleNonce }}">
    html,body{margin:0;min-height:100%}
    body{background:#111615;color:#f3eee5}
    h1{margin:0;font-size:clamp(1.08rem,2.64vw,1.85rem);line-height:1.04}
    body:not(.app-ready) .page-shell{opacity:0;visibility:hidden}
    .boot-splash{position:fixed;inset:0;display:grid;place-items:center;padding:24px;background:
      radial-gradient(circle at top left, rgba(122,172,156,0.12), transparent 26%),
      radial-gradient(circle at right 20%, rgba(27,47,43,0.45), transparent 22%),
      linear-gradient(180deg,#111615 0%,#0d1110 100%);z-index:9999;transition:opacity .24s ease,visibility .24s ease}
    body.app-ready .boot-splash{opacity:0;visibility:hidden;pointer-events:none}
    .boot-shell{width:min(1120px,calc(100vw - 28px));display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:22px;align-items:start}
    .boot-card,.boot-aside{border:1px solid rgba(243,238,229,.1);border-radius:32px;background:rgba(24,31,29,.94);box-shadow:0 24px 64px rgba(0,0,0,.32)}
    .boot-card{min-height:360px;padding:22px}
    .boot-aside{min-height:260px;padding:24px}
    .boot-line,.boot-pill,.boot-block{border-radius:999px;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(120,190,167,.14),rgba(255,255,255,.05));background-size:200% 100%;animation:bootPulse 1.2s linear infinite}
    .boot-line{height:14px;margin-bottom:12px}
    .boot-line.w1{width:28%}.boot-line.w2{width:64%}.boot-line.w3{width:82%}.boot-line.w4{width:54%}
    .boot-block{height:160px;border-radius:22px;margin-top:18px}
    .boot-pill{height:38px;width:132px;margin-top:18px}
    @keyframes bootPulse{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @media (max-width:980px){.boot-shell{grid-template-columns:1fr}.boot-aside{min-height:160px}}
  </style>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body data-share-code="{{ .ShareCode }}">
  <div class="boot-splash" id="boot-splash" aria-hidden="true">
    <div class="boot-shell">
      <div class="boot-card">
        <div class="boot-line w1"></div>
        <div class="boot-line w2"></div>
        <div class="boot-block"></div>
        <div class="boot-line w3"></div>
        <div class="boot-line w4"></div>
        <div class="boot-pill"></div>
      </div>
      <div class="boot-aside">
        <div class="boot-line w1"></div>
        <div class="boot-line w2"></div>
        <div class="boot-line w4"></div>
      </div>
    </div>
  </div>
  <div class="page-shell">
    <main class="main-stage">
      <section class="feed-column">
        <details class="send-bubble composer-bubble feed-composer" id="composer" open>
          <summary title="Click to open or close">// NEW SECRET</summary>
          <div class="composer-body">
            <div class="composer-toolbar" id="composer-toolbar" hidden>
              <p class="signal-note" id="bulk-selection-note" hidden>No secrets selected.</p>
              <div class="bulk-actions-row" id="bulk-actions-row" hidden>
                <button type="button" class="icon-button bulk-action-button" id="bulk-enable-button" aria-label="Turn on selected secrets" title="Turn on selected secrets">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 3v8" />
                    <path d="M7.5 6.75a7 7 0 1 0 9 0" />
                  </svg>
                  <span class="sr-only">Turn on selected secrets</span>
                </button>
                <button type="button" class="icon-button bulk-action-button" id="bulk-disable-button" aria-label="Turn off selected secrets" title="Turn off selected secrets">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 3v8" />
                    <path d="M7.5 6.75a7 7 0 1 0 9 0" />
                    <path d="M4 4l16 16" />
                  </svg>
                  <span class="sr-only">Turn off selected secrets</span>
                </button>
                <button type="button" class="icon-button bulk-action-button" id="bulk-email-button" aria-label="Send selected secrets by email" title="Send selected secrets by email">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <rect x="3" y="5" width="18" height="14" rx="2" />
                    <path d="m5 8 7 5 7-5" />
                  </svg>
                  <span class="sr-only">Send selected secrets by email</span>
                </button>
                <button type="button" class="icon-button bulk-action-button danger-button" id="bulk-delete-button" aria-label="Delete selected secrets" title="Delete selected secrets">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M4 7h16" />
                    <path d="M9 7V4h6v3" />
                    <path d="M7 7l1 12h8l1-12" />
                    <path d="M10 11v5" />
                    <path d="M14 11v5" />
                  </svg>
                  <span class="sr-only">Delete selected secrets</span>
                </button>
              </div>
            </div>
            <div class="editor-head">
              <input id="create-burn-toggle" type="checkbox" checked hidden>
              <input id="create-totp-toggle" type="checkbox" hidden>
            </div>
