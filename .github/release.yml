changelog:
  exclude:
    labels:
      - skip-changelog
      - internal
  categories:
    - title: Security
      labels:
        - security
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Maintenance
      labels:
        - chore
        - docs
        - ci
    - title: Other Changes
      labels:
        - "*"
