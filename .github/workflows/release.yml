name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Temporary: keep releases focused on the production Linux arm64 target only.
          # - goos: linux
          #   goarch: amd64
          #   archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          # - goos: darwin
          #   goarch: amd64
          #   archive: tar.gz
          # - goos: darwin
          #   goarch: arm64
          #   archive: tar.gz
          # - goos: windows
          #   goarch: amd64
          #   archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Generate assets
        run: go run ./tools/minify-assets

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -ldflags="-s -w -buildid=" -o "dist/shhx-${GOOS}-${GOARCH}${ext}" .

      - name: Package archive
        run: |
          cd dist
          file="shhx-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${file}.zip" "${file}.exe"
          else
            tar -czf "${file}.tar.gz" "${file}"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: shhx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
